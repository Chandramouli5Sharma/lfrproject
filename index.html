<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LFR Simulator - PID Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117; --surface: #161b22; --border: #30363d;
            --accent: #58a6ff; --accent2: #3fb950; --warn: #f78166;
            --text: #e6edf3; --muted: #8b949e;
        }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        input[type=range] { height: 4px; -webkit-appearance: none; background: #30363d; border-radius: 5px; width: 100%; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 2px solid var(--bg); box-shadow: 0 0 6px rgba(88,166,255,0.4); }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
        .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
        .val-badge { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-size: 12px; }
        #simCanvas { background: #090d12; display: block; width: 100%; border-radius: 8px; }
        .metric { background: rgba(88,166,255,0.07); border: 1px solid rgba(88,166,255,0.15); border-radius: 8px; padding: 8px 12px; min-width: 90px; }
        .metric-val { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; color: var(--accent); line-height: 1.1; }
        .sensor-dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid var(--border); transition: all 0.05s; }
        .sensor-dot.on { background: #3fb950; border-color: #2ea043; box-shadow: 0 0 6px rgba(63,185,80,0.6); }
        .sensor-dot.off { background: #21262d; }
        .type-btn, .ch-btn { padding: 6px 0; font-size: 10px; font-weight: 700; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all 0.15s; text-transform: uppercase; }
        .type-btn.active, .ch-btn.active { background: rgba(88,166,255,0.15); border-color: var(--accent); color: var(--accent); }
        #toggle-sim { background: linear-gradient(135deg, #238636, #2ea043); border: 1px solid #2ea043; color: white; font-weight: 700; font-size: 14px; padding: 10px 24px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.15s; }
        #toggle-sim:hover { filter: brightness(1.1); transform: translateY(-1px); }
    </style>
</head>
<body>
<div style="max-width:1200px;margin:0 auto;padding:24px 16px;">

    <!-- Header -->
    <header style="display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px;">
        <div>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M9 9h6v6H9z"/><path d="M9 1v3M15 1v3M9 20v3M15 20v3"/></svg>
                <h1 style="font-size:22px;font-weight:700;margin:0;">LFR Controller Simulator</h1>
            </div>
            <p id="mode-text" style="font-size:12px;color:var(--muted);margin:0;">Mode: Fixed Track Simulation</p>
            <div id="csv-info" style="display:none; align-items:center; gap:8px; margin-top:8px;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3fb950" stroke-width="2.5"><path d="M9 16.17L4.83 12l-1.41 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                <span id="csv-name" style="font-size:11px; color:#3fb950; font-weight:600;"></span>
            </div>
        </div>
        <div style="display:flex;gap:12px;align-items:center;">
            <label style="display:flex;align-items:center;gap:8px;padding:10px 16px;background:#21262d;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;color:var(--muted);transition:0.2s;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                Load Sensor CSV
                <input type="file" id="csv-input" accept=".csv" style="display:none">
            </label>
            <button id="toggle-sim">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
                Start Simulation
            </button>
            <button id="reset-btn" title="Reload System" class="p-2.5 bg-[#21262d] border border-[#30363d] rounded-lg text-slate-400 hover:text-white transition-colors">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8M3 3v5h5"/></svg>
            </button>
        </div>
    </header>

    <div style="display:grid;grid-template-columns:300px 1fr;gap:20px;">
        <!-- Sidebar -->
        <aside style="display:flex;flex-direction:column;gap:16px;">
            <div class="card" style="padding:20px;">
                <div class="section-label" style="margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);">PID Parameters</div>
                <div id="pid-sliders" style="display:flex;flex-direction:column;gap:16px;"></div>
            </div>
            <div class="card" style="padding:20px;">
                <div class="section-label" style="margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);">Motion Profile</div>
                <div id="speed-sliders" style="display:flex;flex-direction:column;gap:16px;"></div>
            </div>
            <div class="card" style="padding:20px;">
                <div class="section-label" style="margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);">Calibration</div>
                <div style="margin-bottom:16px;">
                    <div class="section-label" style="margin-bottom:8px;">Sensor Mode</div>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="type-analog" class="type-btn">Analog</button>
                        <button id="type-digital" class="type-btn">Digital</button>
                    </div>
                </div>
                <div id="geo-sliders" style="display:flex;flex-direction:column;gap:16px;"></div>
                <div style="margin-top:16px;">
                    <div class="section-label" style="margin-bottom:8px;">Sensor Array</div>
                    <div id="ch-btns" style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;"></div>
                </div>
            </div>
        </aside>

        <!-- Main View -->
        <section style="display:flex;flex-direction:column;gap:16px;min-width:0;">
            <div class="card" style="padding:16px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                    <div style="display:flex;gap:12px;">
                        <div class="metric"><div class="section-label">PWM</div><div class="metric-val" id="disp-pwm">0</div></div>
                        <div class="metric"><div class="section-label" style="color:var(--warn)">Error</div><div class="metric-val" id="disp-err" style="color:var(--warn)">0</div></div>
                        <div class="metric"><div class="section-label" style="color:var(--accent2)">Step</div><div class="metric-val" id="disp-step" style="color:var(--accent2)">0</div></div>
                    </div>
                    <div id="sensor-bar" style="display:flex;gap:4px;padding:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:10px;"></div>
                </div>
                <div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;position:relative;">
                    <canvas id="simCanvas" height="380"></canvas>
                </div>
            </div>

            <div class="card" style="padding:20px;">
                <div class="section-label" style="margin-bottom:12px;">PID Response Graph</div>
                <div style="height:180px;position:relative;">
                    <canvas id="errorChart"></canvas>
                </div>
            </div>
        </section>
    </div>
</div>

<script>
/** LOGIC CLASSES **/
class PID {
    constructor(kp, ki, kd) { Object.assign(this, { kp, ki, kd, i: 0, prev: 0 }); }
    calculate(e) {
        this.i += e;
        const d = e - this.prev;
        this.prev = e;
        return (this.kp * e) + (this.ki * this.i) + (this.kd * d);
    }
    reset() { this.i = 0; this.prev = 0; }
}

class Robot {
    constructor(wb, so) { this.wb = wb; this.so = so; this.reset(); }
    reset() { this.x = 0; this.y = 0; this.th = 0; }
    init(startX, startY) { this.x = startX; this.y = startY; this.th = 0; }
    updatePhysics(vL, vR, dt) {
        const V = (vR + vL) / 2.0;
        const omega = (vR - vL) / this.wb;
        this.x += V * Math.cos(this.th) * dt;
        this.y += V * Math.sin(this.th) * dt;
        this.th += omega * dt;
    }
    getSensorCenter() { return { x: this.x + this.so * Math.cos(this.th), y: this.y + this.so * Math.sin(this.th) }; }
}

/** STATE & CONFIG **/
const DEFAULTS = { kp: 0.045, ki: 0.00001, kd: 0.45, startSpeed: 110, targetSpeed: 160, wb: 15, so: 11, ns: 7, tw: 16, ss: 1.0, threshold: 500, sensorType: 'analog' };
const P = { ...DEFAULTS };
let running = false, csvMode = false, track = [], trail = [], csvRows = [], currentSpeed = 0, step = 0, animationId = null;

const pid = new PID(P.kp, P.ki, P.kd);
const robot = new Robot(P.wb, P.so);
const cv = document.getElementById('simCanvas'), cx = cv.getContext('2d');

/** FIXED TRACK GENERATION **/
function generateFixedTrack() {
    const pts = [];
    // simplified smoother track: lower frequency sine wave for easier following
    for (let x = 0; x < 1000; x += 2) {
        pts.push({ x, y: Math.sin(x * 0.01) * 60 });
    }
    const minY = Math.min(...pts.map(p => p.y)), maxY = Math.max(...pts.map(p => p.y));
    const offsetY = (cv.height / 2) - (minY + (maxY - minY) / 2);
    const offsetX = 0 - pts[0].x;
    track = pts.map(p => ({ x: p.x + offsetX, y: p.y + offsetY }));
    robot.init(track[0].x, track[0].y);
    draw();
}

/** UI SLIDERS **/
function mkSlider(parent, label, key, min, max, step, isFloat=true) {
    const d = document.createElement('div');
    d.id = `container-${key}`;
    // Format label based on key
    const displayVal = key === 'ki' ? P[key].toFixed(5) : P[key];
    d.innerHTML = `<div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span class="section-label">${label}</span><span class="val-badge" id="v-${key}">${displayVal}</span></div><input type="range" min="${min}" max="${max}" step="${step}" value="${P[key]}">`;
    d.querySelector('input').oninput = (e) => {
        const val = isFloat ? parseFloat(e.target.value) : parseInt(e.target.value);
        P[key] = val; 
        // Force display of small values for Ki
        document.getElementById('v-'+key).innerText = key === 'ki' ? val.toFixed(5) : val;
        pid.kp = P.kp; pid.ki = P.ki; pid.kd = P.kd;
        robot.wb = P.wb; robot.so = P.so;
        if (!running) draw();
    };
    parent.appendChild(d);
}

const PS = document.getElementById('pid-sliders'), SS = document.getElementById('speed-sliders'), GS = document.getElementById('geo-sliders');

// PID Settings: Ki now starts from 0.00001 and increments by 0.00001
mkSlider(PS, 'Kp', 'kp', 0, 2.0, 0.001); 
mkSlider(PS, 'Ki', 'ki', 0.00001, 0.1, 0.00001); 
mkSlider(PS, 'Kd', 'kd', 0, 2.0, 0.01);

mkSlider(SS, 'Start Speed', 'startSpeed', 0, 255, 1, false); 
mkSlider(SS, 'Target Speed', 'targetSpeed', 0, 255, 1, false);
mkSlider(GS, 'Wheelbase', 'wb', 10, 30, 1, false); 
mkSlider(GS, 'Sensor Offset', 'so', 5, 25, 1, false);
mkSlider(GS, 'Track Width (mm)', 'tw', 10, 40, 1, false); 
mkSlider(GS, 'Sensor Threshold', 'threshold', 0, 1023, 1, false);

const chUI = document.getElementById('ch-btns');
function buildChBtns() {
    chUI.innerHTML = '';
    [5, 7, 8, 16].forEach(ch => {
        const b = document.createElement('button');
        b.className = 'ch-btn' + (P.ns === ch ? ' active' : ''); b.textContent = ch + 'ch';
        b.onclick = () => { 
            P.ns = ch; 
            document.querySelectorAll('.ch-btn').forEach(x => x.classList.remove('active')); 
            b.classList.add('active'); 
            if (!running) draw(); 
        };
        chUI.appendChild(b);
    });
}
buildChBtns();

/** SENSOR MODE LOGIC **/
const btnAnalog = document.getElementById('type-analog');
const btnDigital = document.getElementById('type-digital');
const thresholdContainer = document.getElementById('container-threshold');

function setSensorType(type) {
    P.sensorType = type;
    if (type === 'analog') {
        btnAnalog.classList.add('active'); btnDigital.classList.remove('active');
        if (thresholdContainer) {
            thresholdContainer.style.opacity = '1'; thresholdContainer.style.pointerEvents = 'auto';
        }
    } else {
        btnAnalog.classList.remove('active'); btnDigital.classList.add('active');
        if (thresholdContainer) {
            thresholdContainer.style.opacity = '0.3'; thresholdContainer.style.pointerEvents = 'none';
        }
    }
}
btnAnalog.onclick = () => setSensorType('analog');
btnDigital.onclick = () => setSensorType('digital');

/** DRAWING **/
function draw(sensorStates = []) {
    const W = cv.width, H = cv.height;
    cx.clearRect(0, 0, W, H);
    cx.strokeStyle = 'rgba(255,255,255,0.02)'; cx.lineWidth = 1;
    for(let i=0; i<W; i+=40) { cx.beginPath(); cx.moveTo(i,0); cx.lineTo(i,H); cx.stroke(); }
    for(let i=0; i<H; i+=40) { cx.beginPath(); cx.moveTo(0,i); cx.lineTo(W,i); cx.stroke(); }

    if (track.length > 1) {
        cx.beginPath(); cx.strokeStyle = '#2d3748'; 
        cx.lineWidth = P.tw / 2;
        cx.lineCap = 'round'; cx.lineJoin = 'round';
        cx.moveTo(track[0].x, track[0].y); track.forEach(p => cx.lineTo(p.x, p.y)); cx.stroke();
    }
    if (trail.length > 1) {
        cx.beginPath(); cx.strokeStyle = 'rgba(88,166,255,0.4)'; cx.lineWidth = 1.5;
        cx.moveTo(trail[0].x, trail[0].y); trail.forEach(p => cx.lineTo(p.x, p.y)); cx.stroke();
    }
    cx.save(); cx.translate(robot.x, robot.y); cx.rotate(robot.th);
    const hw = P.wb / 2; cx.fillStyle = '#1c6fff'; cx.shadowBlur = 10; cx.shadowColor = 'rgba(28,111,255,0.3)';
    cx.beginPath(); cx.roundRect(-hw, -hw, P.wb, P.wb, 3); cx.fill(); cx.shadowBlur = 0;
    const barW = ((P.ns - 1) * P.ss) / 2 + 4; cx.fillStyle = '#3d4f6b'; cx.fillRect(P.so - 1, -barW, 2, barW * 2);
    const sensorContainer = document.getElementById('sensor-bar');
    if (sensorContainer.children.length !== P.ns) {
        sensorContainer.innerHTML = ''; for (let i=0; i<P.ns; i++) sensorContainer.appendChild(document.createElement('div'));
    }
    for (let i = 0; i < P.ns; i++) {
        const off = (i - (P.ns - 1) / 2.0) * P.ss, active = sensorStates[i];
        cx.fillStyle = active ? '#3fb950' : '#ef4444'; cx.beginPath(); cx.arc(P.so, off, 2, 0, Math.PI * 2); cx.fill();
        if (sensorContainer.children[i]) sensorContainer.children[i].className = 'sensor-dot ' + (active ? 'on' : 'off');
    }
    cx.restore();
}

/** SIMULATION LOOP **/
function loop() {
    if (!running) return;
    const dt = 0.05;
    if (currentSpeed < P.targetSpeed) currentSpeed += 0.5;

    let err = 0, states = [];

    if (csvMode && step < csvRows.length) {
        const rawRow = csvRows[step];
        states = rawRow.map(val => P.sensorType === 'digital' ? val > 0 : val >= P.threshold);
        let tw = 0, cnt = 0;
        for (let i = 0; i < states.length; i++) {
            if (states[i]) {
                tw += (i - (states.length - 1) / 2.0) * 100;
                cnt++;
            }
        }
        err = cnt > 0 ? tw / cnt : 0;
    } else {
        const center = robot.getSensorCenter();
        let tw = 0, cnt = 0;
        for (let i = 0; i < P.ns; i++) {
            const offset = (i - (P.ns - 1) / 2.0) * P.ss;
            const sY = center.y + offset * Math.cos(robot.th), sX = center.x - offset * Math.sin(robot.th);
            let clY = track[0].y, minD = Math.abs(sX - track[0].x);
            for (const p of track) { const d = Math.abs(sX - p.x); if (d < minD) { minD = d; clY = p.y; } }
            const active = Math.abs(sY - clY) <= (P.tw / 2.0);
            states.push(active);
            if (active) { tw += offset * 100; cnt++; }
        }
        err = cnt > 0 ? tw / cnt : 0;
    }

    const correction = pid.calculate(err);
    robot.updatePhysics((currentSpeed - correction) * 0.05, (currentSpeed + correction) * 0.05, dt);
    
    step++; trail.push({ x: robot.x, y: robot.y });
    document.getElementById('disp-pwm').innerText = Math.round(currentSpeed);
    document.getElementById('disp-err').innerText = Math.round(err);
    document.getElementById('disp-step').innerText = step;
    draw(states);

    chart.data.datasets[0].data.shift(); chart.data.datasets[0].data.push(Math.abs(err)); chart.update('none');

    if (robot.x > cv.width + 100 || (csvMode && step >= csvRows.length)) {
        running = false; 
        document.getElementById('toggle-sim').innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg> Start Simulation`;
        return;
    }
    animationId = requestAnimationFrame(loop);
}

/** CHART & EVENTS **/
const chart = new Chart(document.getElementById('errorChart').getContext('2d'), {
    type: 'line', data: { labels: Array(100).fill(''), datasets: [{ data: Array(100).fill(0), borderColor: '#f78166', borderWidth: 2, pointRadius: 0, fill: true, backgroundColor: 'rgba(247,129,102,0.05)', tension: 0.4 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } } }, animation: false }
});

document.getElementById('toggle-sim').onclick = () => {
    if (animationId) cancelAnimationFrame(animationId);
    running = true; step = 0; trail = []; currentSpeed = P.startSpeed; pid.reset();
    if (track.length > 0) robot.init(track[0].x, track[0].y);
    document.getElementById('toggle-sim').innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Restart Sim`;
    loop();
};

document.getElementById('reset-btn').onclick = () => { location.reload(); };

document.getElementById('csv-input').onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        const lines = ev.target.result.split('\n').map(l => l.trim()).filter(Boolean);
        if (lines.length < 2) return;
        csvRows = lines.slice(1).map(l => l.split(',').map(v => Number(v.trim())));
        P.ns = lines[0].split(',').length; 
        csvMode = true;
        document.getElementById('csv-info').style.display = 'flex';
        document.getElementById('csv-name').innerText = file.name;
        document.getElementById('mode-text').innerText = `Playback: ${file.name}`;
        buildChBtns(); if (!running) draw();
    };
    reader.readAsText(file);
};

window.onload = () => {
    cv.width = cv.parentElement.offsetWidth;
    generateFixedTrack(); setSensorType('analog');
};
</script>
</body>
</html>
